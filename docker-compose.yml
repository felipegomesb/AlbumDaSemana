services:
  db:
    image: postgres:17
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.local

  django-web:
    build: .
    container_name: album-da-semana-web
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - media_data:/app/media
    env_file:
      - .env.local

volumes:
  postgres_data:
  media_data: